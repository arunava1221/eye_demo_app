name: iOS Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-ios:
    name: Build iOS on macOS
    runs-on: macos-15

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS app without signing
        run: flutter build ios --release --no-codesign

      - name: Package iOS app artifact
        run: |
          mkdir -p build/ios/artifacts
          ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app build/ios/artifacts/Runner.app.zip

      - name: Upload iOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-app-unsigned
          path: build/ios/artifacts/Runner.app.zip
